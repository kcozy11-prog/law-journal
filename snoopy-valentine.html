<style>
  :root {
    --pink-50: #fff1f5;
    --pink-100: #ffe4ec;
    --pink-300: #ff9eb8;
    --pink-500: #ff5c85;
    --pink-700: #c4365c;
    --cream: #fff8e7;
    --ink: #2b1d24;
    --ink-soft: #5a4651;
    --line: #f3c4d1;
    --gold: #d99a4a;
    --green: #6a8f4d;
    --shadow: 0 6px 24px rgba(196, 54, 92, 0.12);
  }

  * { box-sizing: border-box; }
  html, body, #root { height: 100%; }

  body {
    margin: 0;
    font-family: 'Noto Sans KR', system-ui, -apple-system, BlinkMacSystemFont,
      'Segoe UI', Roboto, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 10% 0%, #ffd5e2 0%, transparent 40%),
      radial-gradient(circle at 90% 10%, #ffe9d6 0%, transparent 35%),
      var(--pink-50);
    background-attachment: fixed;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  button { font-family: inherit; cursor: pointer; }
  input { font-family: inherit; }

  .app { max-width: 1080px; margin: 0 auto; padding: 32px 24px 80px; }

  /* Header */
  .app-header { text-align: center; padding: 16px 0 24px; }
  .brand {
    display: inline-block;
    font-size: 12px;
    letter-spacing: 0.32em;
    color: var(--pink-700);
    background: white;
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid var(--line);
    margin-bottom: 14px;
  }
  .app-header h1 {
    font-family: 'Gaegu', 'Noto Sans KR', sans-serif;
    font-size: clamp(32px, 4.6vw, 48px);
    margin: 0;
    letter-spacing: -0.01em;
  }
  .heart {
    color: var(--pink-500);
    display: inline-block;
    transform: translateY(-2px);
    animation: heart 1.4s ease-in-out infinite;
  }
  @keyframes heart {
    0%, 100% { transform: translateY(-2px) scale(1); }
    50%     { transform: translateY(-2px) scale(1.18); }
  }
  .subtitle { margin-top: 8px; color: var(--ink-soft); }

  /* Tabs */
  .scene-tabs {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin: 20px 0 22px;
  }
  .tab {
    background: white;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px 14px;
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 4px;
    transition: all 0.15s ease;
    color: inherit;
  }
  .tab:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
  .tab.active {
    background: linear-gradient(135deg, var(--pink-500), var(--pink-700));
    color: white;
    border-color: transparent;
    box-shadow: var(--shadow);
  }
  .tab-num {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.85;
  }
  .tab-label { font-size: 14px; font-weight: 600; }

  /* Main grid */
  .main {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 280px;
    gap: 20px;
    align-items: start;
  }
  @media (max-width: 860px) {
    .main { grid-template-columns: 1fr; }
    .scene-tabs { grid-template-columns: repeat(2, 1fr); }
  }

  /* Scene card */
  .scene {
    background: white;
    border-radius: 18px;
    padding: 24px;
    box-shadow: var(--shadow);
    border: 1px solid var(--line);
  }
  .scene-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    border-bottom: 1px dashed var(--line);
    padding-bottom: 16px;
    margin-bottom: 16px;
  }
  .scene-header h2 {
    font-family: 'Gaegu', sans-serif;
    font-size: 22px;
    margin: 0;
    color: var(--pink-700);
  }
  .scene-title-ko { margin: 4px 0 0; color: var(--ink-soft); font-size: 14px; }
  .badge {
    background: var(--pink-100);
    color: var(--pink-700);
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
  }

  /* Word box */
  .word-box {
    background: linear-gradient(180deg, var(--cream), #fff);
    border: 1.5px dashed var(--gold);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 18px;
  }
  .word-box-label {
    font-size: 11px;
    letter-spacing: 0.24em;
    color: var(--gold);
    font-weight: 700;
    margin-bottom: 8px;
  }
  .word-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    background: white;
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 5px 12px;
    font-size: 14px;
    border-radius: 999px;
    font-weight: 500;
  }

  /* Lines */
  .lines { display: flex; flex-direction: column; gap: 14px; }
  .line {
    padding: 14px 16px;
    border-radius: 12px;
    background: var(--pink-50);
    border: 1px solid transparent;
  }
  .line:hover { border-color: var(--line); }
  .who {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--pink-700);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .en { font-size: 17px; line-height: 1.8; color: var(--ink); }
  .ko { margin-top: 6px; font-size: 13px; color: var(--ink-soft); }

  /* Blank inputs */
  .blank-wrap { display: inline-flex; align-items: center; gap: 4px; }
  .blank {
    border: none;
    border-bottom: 2px solid var(--pink-300);
    background: rgba(255, 255, 255, 0.7);
    padding: 2px 6px;
    font-size: 17px;
    color: var(--ink);
    outline: none;
    border-radius: 4px 4px 0 0;
    transition: all 0.12s ease;
    text-align: center;
  }
  .blank:focus {
    border-bottom-color: var(--pink-500);
    background: white;
    box-shadow: 0 4px 0 -2px var(--pink-100);
  }
  .blank.correct {
    border-bottom-color: var(--green);
    color: var(--green);
    background: #effbe7;
    font-weight: 700;
  }
  .blank.wrong { border-bottom-color: #d04848; background: #ffeded; }
  .blank.reveal {
    background: var(--cream);
    border-bottom-color: var(--gold);
    color: var(--pink-700);
    font-weight: 700;
  }
  .answer-tag {
    font-size: 9px;
    letter-spacing: 0.16em;
    color: var(--gold);
    background: white;
    border: 1px solid var(--gold);
    border-radius: 4px;
    padding: 1px 4px;
    vertical-align: super;
  }

    display: flex;
    gap: 10px;
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px dashed var(--line);
    flex-wrap: wrap;

  .btn {
    border: none;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 700;
    border-radius: 10px;
    transition: all 0.15s ease;

  .btn.primary {
    background: linear-gradient(135deg, var(--pink-500), var(--pink-700));
    color: white;
    box-shadow: 0 4px 0 rgba(196, 54, 92, 0.25);

    background: white;
    color: var(--ink-soft);
    border: 1px solid var(--line);

    color: var(--pink-700);

    font-size: 13px;
    font-weight: 600;

    margin-top: 32px;
    font-size: 12px;
    color: var(--ink-soft);

    text-align: center;
    padding: 60px 20px;
    color: var(--ink-soft);

    align-items: center;
    gap: 4px;
    background: #ecf6ff;
    border: 1px solid #b3d6f5;
    color: #1a5b94;

    font-weight: 700;

    border: 1px solid var(--line);
    margin-bottom: 16px;

    gap: 10px;

    padding-bottom: 12px;
    margin-bottom: 14px;

  .pattern-label {

  .pattern-examples {

    flex-direction: column;

  .pattern-example {

  .pattern-example .ex-en { font-size: 15px; color: var(--ink); }

    color: var(--ink-soft);

  .pattern-example .ex-loc {
    font-size: 10px;
    letter-spacing: 0.16em;
    color: var(--pink-700);
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .pattern-example .chunk {
    background: #fff5cc;
    border-bottom: 2px solid var(--gold);
    padding: 0 3px;
    font-weight: 700;
  }

</head>

// ── 유틸 ─────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function normalize(s) {
  return (s || '')
    .toLowerCase()
    .trim()
    .replace(/[.,!?;:'"]/g, '')
    .replace(/\s+/g, ' ');
}

// ── Components ───────────────────────────────────────────
function GrammarBadge({ tag }) {
  if (!tag) return null;
  const g = grammarPatterns[tag];
  if (!g) return null;
  return (
    <span
      className="grammar-tag"
      title={`${g.formula}\n\n${g.note}`}
    >
      {g.label}
    </span>
  );
}

function FillBlankLine({ line, lineIdx, sceneIdx, answers, setAnswers, showAnswers }) {
  const parts = line.en.text.split('{}');
  const blanks = line.en.blanks;

  return (
    <div className="line">
      <div className="who">
        {line.who}
        <GrammarBadge tag={line.grammar} />
      </div>
      <div className="en">
        {parts.map((part, i) => {
          if (i >= blanks.length) return <span key={i}>{part}</span>;
          const key = `${sceneIdx}-${lineIdx}-${i}`;
          const userValue = answers[key] ?? '';
          const correct = blanks[i];
          const isCorrect = userValue.length > 0 && normalize(userValue) === normalize(correct);
          const isWrong = userValue.length > 0 && !isCorrect;
          return (
            <span key={i}>
              <span>{part}</span>
              <span className="blank-wrap">
                <input
                  className={
                    'blank' +
                    (showAnswers ? ' reveal' : '') +
                    (isCorrect ? ' correct' : '') +
                    (isWrong && !showAnswers ? ' wrong' : '')
                  }
                  type="text"
                  value={showAnswers ? correct : userValue}
                  onChange={(e) => setAnswers((p) => ({ ...p, [key]: e.target.value }))}
                  readOnly={showAnswers}
                  placeholder="____"
                  style={{
                    minWidth: '6ch',
                    width: `${Math.max(correct.length + 2, 6)}ch`,
                    maxWidth: '100%',
                  }}
                />
                {showAnswers && <span className="answer-tag">정답</span>}
              </span>
            </span>
          );
        })}
      </div>
      <div className="ko">{line.ko}</div>
    </div>
  );
}

function Scene({ scene, sceneIdx, answers, setAnswers }) {
  const [showAnswers, setShowAnswers] = useState(false);

  const allBlanks = useMemo(
    () => scene.speakers.flatMap((s) => s.en.blanks),
    [scene]
  );
  // 단어 상자에서는 같은 청크 중복 제거 (예: "must be" 가 두 번 등장해도 한 번만)
  const wordBox = useMemo(
    () => shuffle(Array.from(new Set(allBlanks))),
    [allBlanks]
  );

  const filledCount = scene.speakers.reduce((acc, line, lineIdx) => {
    return (
      acc +
      line.en.blanks.filter((correct, i) => {
        const key = `${sceneIdx}-${lineIdx}-${i}`;
        return normalize(answers[key] ?? '') === normalize(correct);
      }).length
    );
  }, 0);

  const clearScene = () => {
    setAnswers((prev) => {
      const next = { ...prev };
      Object.keys(next).forEach((k) => {
        if (k.startsWith(`${sceneIdx}-`)) delete next[k];
      });
      return next;
    });
    setShowAnswers(false);
  };

  return (
    <section className="scene">
      <header className="scene-header">
        <div>
          <h2>{scene.title}</h2>
          <p className="scene-title-ko">{scene.titleKo}</p>
        </div>
        <div className="scene-stats">
          <span className="badge">
            {filledCount} / {allBlanks.length} 정답
          </span>
        </div>
      </header>

      <div className="word-box">
        <div className="word-box-label">단어 상자 · Word Box</div>
        <div className="word-chips">
          {wordBox.map((w, i) => (
            <span className="chip" key={`${w}-${i}`}>{w}</span>
          ))}
        </div>
      </div>

      <div className="lines">
        {scene.speakers.map((line, idx) => (
          <FillBlankLine
            key={idx}
            line={line}
            lineIdx={idx}
            sceneIdx={sceneIdx}
            answers={answers}
            setAnswers={setAnswers}
            showAnswers={showAnswers}
          />
        ))}
      </div>

      <div className="scene-actions">
        <button
          className={'btn primary' + (showAnswers ? ' active' : '')}
          onClick={() => setShowAnswers((v) => !v)}
        >
          {showAnswers ? '정답 숨기기' : '정답 보기'}
        </button>
        <button className="btn ghost" onClick={clearScene}>
          다시 풀기
        </button>
      </div>
    </section>
  );
}

// 같은 문법 태그를 가진 모든 문장을 모아서 보여주는 패턴 연습 탭
function PatternPractice() {
  // 1) 모든 장면을 돌면서 grammar 태그가 있는 문장만 수집
  const grouped = useMemo(() => {
    const map = {};
    scenes.forEach((scene, sIdx) => {
      scene.speakers.forEach((line) => {
        if (!line.grammar) return;
        if (!map[line.grammar]) map[line.grammar] = [];
        map[line.grammar].push({
          sceneId: scene.id,
          sceneIdx: sIdx,
          who: line.who,
          ko: line.ko,
          // 빈칸 자리에 정답을 다시 끼워 넣어 완성 문장 생성
          en: line.en.text.replace(/\{\}/g, () => '__CHUNK__'),
          chunks: line.en.blanks,
        });
      });
    });
    return map;
  }, []);

  // 2) grammarPatterns 정의 순서대로 카드를 렌더링 (정의되어 있으나 예문 없는 패턴은 생략)
  const patternIds = Object.keys(grammarPatterns).filter(
    (id) => grouped[id] && grouped[id].length > 0
  );

  return (
    <section>
      <div className="pattern-intro">
        <h2>패턴 연습 · Grammar Patterns</h2>
        <p>
          같은 문법 패턴을 가진 문장끼리 모았어요. 같은 구조가 반복되면
          머릿속에 더 잘 박혀요. 노란 부분이 핵심 청크예요.
        </p>
      </div>

      {patternIds.map((id) => {
        const g = grammarPatterns[id];
        const examples = grouped[id];
        return (
          <div className="pattern-card" key={id}>
            <div className="pattern-card-head">
              <span className="pattern-label">{g.label}</span>
              <code className="pattern-formula">{g.formula}</code>
              <p className="pattern-note">{g.note}</p>
            </div>

            <div className="pattern-examples">
              {examples.map((ex, i) => {
                // __CHUNK__ 자리들을 chunks 배열의 값으로 차례차례 치환하며 렌더
                const segments = ex.en.split('__CHUNK__');
                return (
                  <div className="pattern-example" key={i}>
                    <div className="ex-loc">
                      Scene {ex.sceneId} · {ex.who}
                    </div>
                    <div className="ex-en">
                      {segments.map((seg, j) => (
                        <React.Fragment key={j}>
                          <span>{seg}</span>
                          {j < ex.chunks.length && (
                            <span className="chunk">{ex.chunks[j]}</span>
                          )}
                        </React.Fragment>
                      ))}
                    </div>
                    <div className="ex-ko">{ex.ko}</div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </section>
  );
}
