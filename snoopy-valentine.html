<style>
  :root {
    --pink-50: #fff1f5;
    --pink-100: #ffe4ec;
    --pink-300: #ff9eb8;
    --pink-500: #ff5c85;
    --pink-700: #c4365c;
    --cream: #fff8e7;
    --ink: #2b1d24;
    --ink-soft: #5a4651;
    --line: #f3c4d1;
    --gold: #d99a4a;
    --green: #6a8f4d;
    --shadow: 0 6px 24px rgba(196, 54, 92, 0.12);
  }

  * { box-sizing: border-box; }
  html, body, #root { height: 100%; }

  body {
    margin: 0;
    font-family: 'Noto Sans KR', system-ui, -apple-system, BlinkMacSystemFont,
      'Segoe UI', Roboto, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 10% 0%, #ffd5e2 0%, transparent 40%),
      radial-gradient(circle at 90% 10%, #ffe9d6 0%, transparent 35%),
      var(--pink-50);
    background-attachment: fixed;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  button { font-family: inherit; cursor: pointer; }
  input { font-family: inherit; }

  .app { max-width: 1080px; margin: 0 auto; padding: 32px 24px 80px; }

  /* Header */
  .app-header { text-align: center; padding: 16px 0 24px; }
  .brand {
    display: inline-block;
    font-size: 12px;
    letter-spacing: 0.32em;
    color: var(--pink-700);
    background: white;
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid var(--line);
    margin-bottom: 14px;
  }
  .app-header h1 {
    font-family: 'Gaegu', 'Noto Sans KR', sans-serif;
    font-size: clamp(32px, 4.6vw, 48px);
    margin: 0;
    letter-spacing: -0.01em;
  }
  .heart {
    color: var(--pink-500);
    display: inline-block;
    transform: translateY(-2px);
    animation: heart 1.4s ease-in-out infinite;
  }
  @keyframes heart {
    0%, 100% { transform: translateY(-2px) scale(1); }
    50%     { transform: translateY(-2px) scale(1.18); }
  }
  .subtitle { margin-top: 8px; color: var(--ink-soft); }

  /* Tabs */
  .scene-tabs {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin: 20px 0 22px;
  }
  .tab {
    background: white;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px 14px;
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 4px;
    transition: all 0.15s ease;
    color: inherit;
  }
  .tab:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
  .tab.active {
    background: linear-gradient(135deg, var(--pink-500), var(--pink-700));
    color: white;
    border-color: transparent;
    box-shadow: var(--shadow);
  }
  .tab-num {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.85;
  }
  .tab-label { font-size: 14px; font-weight: 600; }

  /* Main grid */
  .main {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 280px;
    gap: 20px;
    align-items: start;
  }
  @media (max-width: 860px) {
    .main { grid-template-columns: 1fr; }
    .scene-tabs { grid-template-columns: repeat(2, 1fr); }
  }

  /* Scene card */
  .scene {
    background: white;
    border-radius: 18px;
    padding: 24px;
    box-shadow: var(--shadow);
    border: 1px solid var(--line);
  }
  .scene-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    border-bottom: 1px dashed var(--line);
    padding-bottom: 16px;
    margin-bottom: 16px;
  }
  .scene-header h2 {

    font-size: 22px;
    margin: 0;
    color: var(--pink-700);
  }
  .scene-title-ko { margin: 4px 0 0; color: var(--ink-soft); font-size: 14px; }
  .badge {
    background: var(--pink-100);
    color: var(--pink-700);
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 700;

    padding: 14px 16px;

    border-radius: 999px;

  .blank.correct {

    color: var(--pink-700);

    color: var(--ink-soft);
    border: 1px solid var(--line);

    color: var(--pink-700);

    margin-top: 32px;
    font-size: 12px;
    color: var(--ink-soft);
  }

  .loader {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-soft);
  }
</style>

// ── 유틸 ─────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function normalize(s) {
  return (s || '').toLowerCase().trim().replace(/[.,!?;:'"]/g, '');
}

// ── Components ───────────────────────────────────────────
function FillBlankLine({ line, lineIdx, sceneIdx, answers, setAnswers, showAnswers }) {
  const parts = line.en.text.split('{}');
  const blanks = line.en.blanks;

  return (
    <div className="line">
      <div className="who">{line.who}</div>
      <div className="en">
        {parts.map((part, i) => {
          if (i >= blanks.length) return <span key={i}>{part}</span>;
          const key = `${sceneIdx}-${lineIdx}-${i}`;
          const userValue = answers[key] ?? '';
          const correct = blanks[i];
          const isCorrect = userValue.length > 0 && normalize(userValue) === normalize(correct);
          const isWrong = userValue.length > 0 && !isCorrect;
          return (
            <span key={i}>
              <span>{part}</span>
              <span className="blank-wrap">
                <input
                  className={
                    'blank' +
                    (showAnswers ? ' reveal' : '') +
                    (isCorrect ? ' correct' : '') +
                    (isWrong && !showAnswers ? ' wrong' : '')
                  }
                  type="text"
                  value={showAnswers ? correct : userValue}
                  onChange={(e) => setAnswers((p) => ({ ...p, [key]: e.target.value }))}
                  readOnly={showAnswers}
                  placeholder="____"
                  style={{ width: `${Math.max(correct.length + 2, 6)}ch` }}
                />
                {showAnswers && <span className="answer-tag">정답</span>}
              </span>
            </span>
          );
        })}
      </div>
      <div className="ko">{line.ko}</div>
    </div>
  );
}

function Scene({ scene, sceneIdx, answers, setAnswers }) {
  const [showAnswers, setShowAnswers] = useState(false);

  const allBlanks = useMemo(
    () => scene.speakers.flatMap((s) => s.en.blanks),
    [scene]
  );
  const wordBox = useMemo(() => shuffle(allBlanks), [allBlanks]);

  const filledCount = scene.speakers.reduce((acc, line, lineIdx) => {
    return (
      acc +
      line.en.blanks.filter((correct, i) => {
        const key = `${sceneIdx}-${lineIdx}-${i}`;
        return normalize(answers[key] ?? '') === normalize(correct);
      }).length
    );
  }, 0);

  const clearScene = () => {
    setAnswers((prev) => {
      const next = { ...prev };
      Object.keys(next).forEach((k) => {
        if (k.startsWith(`${sceneIdx}-`)) delete next[k];
      });
      return next;
    });
    setShowAnswers(false);
  };

  return (
    <section className="scene">
      <header className="scene-header">
        <div>
          <h2>{scene.title}</h2>
          <p className="scene-title-ko">{scene.titleKo}</p>
        </div>
        <div className="scene-stats">
          <span className="badge">
            {filledCount} / {allBlanks.length} 정답
          </span>
        </div>
      </header>

      <div className="word-box">
        <div className="word-box-label">단어 상자 · Word Box</div>
        <div className="word-chips">
          {wordBox.map((w, i) => (
            <span className="chip" key={`${w}-${i}`}>{w}</span>
          ))}
        </div>
      </div>

      <div className="lines">
        {scene.speakers.map((line, idx) => (
          <FillBlankLine
            key={idx}
            line={line}
            lineIdx={idx}
            sceneIdx={sceneIdx}
            answers={answers}
            setAnswers={setAnswers}
            showAnswers={showAnswers}
          />
        ))}
      </div>

      <div className="scene-actions">
        <button
          className={'btn primary' + (showAnswers ? ' active' : '')}
          onClick={() => setShowAnswers((v) => !v)}
        >
          {showAnswers ? '정답 숨기기' : '정답 보기'}
        </button>
        <button className="btn ghost" onClick={clearScene}>
          다시 풀기
        </button>
      </div>
    </section>
  );
}

function App() {
  const [activeScene, setActiveScene] = useState(0);
  const [answers, setAnswers] = useState({});

  return (
    <div className="app">
      <header className="app-header">
        <span className="brand">PEANUTS · 스누피와 함께하는 영어</span>
        <h1>
          Hearts For My Sweet Baboo <span className="heart">♥</span>
        </h1>
        <p className="subtitle">발렌타인 데이 에피소드로 배우는 영어 빈칸 채우기</p>
      </header>

      <nav className="scene-tabs">
        {scenes.map((s, i) => (
          <button
            key={s.id}
            className={'tab' + (activeScene === i ? ' active' : '')}
            onClick={() => setActiveScene(i)}
          >
            <span className="tab-num">Scene {s.id}</span>
            <span className="tab-label">
              {s.titleKo.replace(/^장면 \d+ — /, '')}
            </span>
          </button>
        ))}
      </nav>

      <main className="main">
        <Scene
          scene={scenes[activeScene]}
          sceneIdx={activeScene}
          answers={answers}
          setAnswers={setAnswers}
        />

        <aside className="tips">
          <h3>학습 팁</h3>
          <ul>
            {learningTips.map((t) => (
              <li key={t.term}>
                <strong>{t.term}</strong> — {t.tip}
              </li>
            ))}
          </ul>
          <a
            className="yt-link"
            href="https://www.youtube.com/watch?v=7EY0gxSAnq8"
            target="_blank"
            rel="noreferrer noopener"
          >
            ▶ 원본 영상 보기 (YouTube)
          </a>
        </aside>
      </main>

      <footer className="app-footer">
        단어 상자에서 정답 단어를 찾아 빈칸에 입력해 보세요.
        막히면 <em>정답 보기</em> 버튼을 눌러 확인할 수 있어요.
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
